name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vishwakarma-api

jobs:
  build-and-push:
    name: Build & Push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # needed to push to ghcr.io

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provided, no setup needed

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Railway Redeploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Redeploy on Railway
        # Railway webhook — set RAILWAY_DEPLOY_WEBHOOK in repo secrets
        # Get this from: Railway dashboard → Service → Settings → Deploy Webhook
        run: |
          if [ -n "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}" ]; then
            curl -s -X POST "${{ secrets.RAILWAY_DEPLOY_WEBHOOK }}"
            echo "✅ Railway redeploy triggered."
          else
            echo "⚠️  RAILWAY_DEPLOY_WEBHOOK secret not set — skipping auto-deploy."
            echo "    Add it in: GitHub repo → Settings → Secrets → Actions"
          fi
