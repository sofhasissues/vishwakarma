services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vishwakarma_postgres
    environment:
      POSTGRES_USER: vishwakarma
      POSTGRES_PASSWORD: vishwakarma_dev
      POSTGRES_DB: vishwakarma_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vishwakarma"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vishwakarma_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
